##############Initial Setting#####################
#   [TPM]
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

#256 color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'
set-environment -g COLORTERM "truecolor"

#Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

#No escape delay
set -sg escape-time 0

#Vim Motion
setw -g mode-keys vi
#set status-keys vi         #nice option but I can't quit command prompt


#Status Baaar
set -g status off
set -g status-position top
set -g status-interval 60          #This Makes Tmux Blazingly Faaaast(Not Really)

#tmux-yank
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
set -g @yank_selection 'clipboard' # 'primary' or 'secondary' or 'clipboard'

#display pane time
set -g display-panes-time 5000







#################Remap############################

#C-b to C-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix


#Move Love Alt Native
bind -n M-1 swap-pane -D
bind -n M-2 swap-pane -U

bind -n M-h previous-window
bind -n M-l next-window

bind -n M-j select-pane -t :.+
bind -n M-k select-pane -t :.-

bind -n M-s split-window -v -c "#{pane_current_path}"
bind -n M-v split-window -h -c "#{pane_current_path}"

bind -n M-r source-file ~/.tmux.conf
bind -n M-a resize-pane -Z
bind -n M-e set -g status
bind -n M-Tab last-window
#bind -n M-i display "#W"
bind -n M-n neww -n 'NOTE' 'cd ~/note/ ; nvim index.md'
#bind -n M-m show-messages
bind -n M-m run-shell -b ". ~/bash/tmugs-man.sh || exit 0; exec bash"
#bind -n M-b neww "sleep 30; echo 'so long'"
bind -n M-Enter run-shell -b ". ~/bash/tmugs-cd.sh || exit 0; exec bash"
bind -n M-Space run-shell -b ". ~/bash/tmugs-vim.sh || exit 0; exec bash"
bind -n M-q run-shell -b ". ~/bash/tmugs-alias.sh || exit 0; exec bash"
#bind -n M-Escape command-prompt -p "Rename the Window:" -I "#W" { rename-window "%%" }
bind -n M-w choose-tree -Zw
bind -n "M-/" list-keys -N
bind -n "M-?" list-keys
bind -n "M-;" clock-mode
bind -n "M-'" copy-mode
bind -n "M-:" command-prompt

bind -n M-J resize-pane -D 8
bind -n M-K resize-pane -U 8
bind -n M-H resize-pane -L 8
bind -n M-L resize-pane -R 8

#swap window
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1


#fzf window         nice try but it is not better than the original <leader>w command
#bind -T root F1 run-shell -b "tmux list-windows | cut -d ' ' -f 1-2 |
#   fzf-tmux -p 50% --border-label='Switch Teamugs Window' |
#   cut -c 1 | xargs tmux select-window -t || exit 0"

#"fast" rename-window       
bind -T root F2 run-shell -b "cat ~/.tmux-windownames |
    fzf-tmux -p 50% --border-label='Rename Teamugs Window name' |
    xargs tmux rename-window || exit 0"











