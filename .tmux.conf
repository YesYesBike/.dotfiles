#set -g message-style 'bg=colour65, fg=colour188 bold'

#swap window
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

#Note
bind M neww 'cd ~/note/ && nvim index.md' \; rename-window 'NOTE'

#toggle status bar
bind h set -g status
